name: macOS-Silicon-Direct-Access

on:
  workflow_dispatch:

jobs:
  create-access:
    runs-on: macos-latest
    timeout-minutes: 3600

    steps:
      - name: Setup VNC + Tailscale + Webserver
        run: |
          # ── Prevent sleep ──────────────────────────────────────────
          sudo pmset -a displaysleep 0 sleep 0 disksleep 0
          caffeinate -dimsu &

          # ── Who owns the GUI session ───────────────────────────────
          GUI_USER=$(stat -f "%Su" /dev/console)
          GUI_UID=$(id -u "$GUI_USER")
          echo "$GUI_UID"  > /tmp/gui_uid
          echo "$GUI_USER" > /tmp/gui_user
          echo "[+] GUI session: $GUI_USER ($GUI_UID)"

          # ── Install Quartz (fixes ModuleNotFoundError) ─────────────
          pip3 install pyobjc-framework-Quartz --break-system-packages --quiet
          echo "[+] Quartz installed"

          # ── Enable VNC password auth ───────────────────────────────
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement \
            VNCLegacyEnabled -bool true

          # Write VNC password to CORRECT path (com.apple. prefix required)
          sudo python3 -c "
          pwd = b'apple\x00\x00\x00'
          key = [23,82,107,6,35,78,88,7]
          enc = bytes([pwd[i]^key[i] for i in range(8)])
          open('/Library/Preferences/com.apple.VNCSettings.txt','wb').write(enc)
          print('[+] VNC password file written')
          "

          # Kickstart ARD — this flips the toggle ON
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpwd -vncpwd apple \
            -access -on \
            -allowAccessFor -allUsers \
            -restart -agent

          # Hard restart screensharing service
          sudo launchctl load -w \
            /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          sudo launchctl kickstart -k system/com.apple.screensharing
          sleep 3
          echo "[+] VNC ready on :5900 — password: apple"

          # ── Screencap loop ─────────────────────────────────────────
          mkdir -p /tmp/stream
          while true; do
            screencapture -x -C /tmp/stream/screen.jpg 2>/dev/null
            sleep 2
          done &

          # ── Write webserver ────────────────────────────────────────
          cat > /tmp/stream/webserver.py << 'ENDPY'
          #!/usr/bin/env python3
          import json, os, subprocess, urllib.parse
          from http.server import SimpleHTTPRequestHandler, HTTPServer

          _Q_CLICK = """
          import Quartz, time
          def click(x, y):
              mv = Quartz.CGEventCreateMouseEvent(None, Quartz.kCGEventMouseMoved, (x,y), Quartz.kCGMouseButtonLeft)
              Quartz.CGEventPost(Quartz.kCGSessionEventTap, mv)
              time.sleep(0.05)
              dn = Quartz.CGEventCreateMouseEvent(None, Quartz.kCGEventLeftMouseDown, (x,y), Quartz.kCGMouseButtonLeft)
              Quartz.CGEventPost(Quartz.kCGSessionEventTap, dn)
              time.sleep(0.05)
              up = Quartz.CGEventCreateMouseEvent(None, Quartz.kCGEventLeftMouseUp, (x,y), Quartz.kCGMouseButtonLeft)
              Quartz.CGEventPost(Quartz.kCGSessionEventTap, up)
          click({x},{y})
          """

          _Q_DBL = """
          import Quartz, time
          def dbl(x, y):
              for _ in range(2):
                  dn = Quartz.CGEventCreateMouseEvent(None, Quartz.kCGEventLeftMouseDown, (x,y), Quartz.kCGMouseButtonLeft)
                  Quartz.CGEventPost(Quartz.kCGSessionEventTap, dn)
                  time.sleep(0.05)
                  up = Quartz.CGEventCreateMouseEvent(None, Quartz.kCGEventLeftMouseUp, (x,y), Quartz.kCGMouseButtonLeft)
                  Quartz.CGEventPost(Quartz.kCGSessionEventTap, up)
                  time.sleep(0.07)
          dbl({x},{y})
          """

          _Q_RIGHT = """
          import Quartz, time
          dn = Quartz.CGEventCreateMouseEvent(None, Quartz.kCGEventRightMouseDown, ({x},{y}), Quartz.kCGMouseButtonRight)
          Quartz.CGEventPost(Quartz.kCGSessionEventTap, dn)
          time.sleep(0.05)
          up = Quartz.CGEventCreateMouseEvent(None, Quartz.kCGEventRightMouseUp, ({x},{y}), Quartz.kCGMouseButtonRight)
          Quartz.CGEventPost(Quartz.kCGSessionEventTap, up)
          """

          _Q_MOVE = """
          import Quartz
          e = Quartz.CGEventCreateMouseEvent(None, Quartz.kCGEventMouseMoved, ({x},{y}), Quartz.kCGMouseButtonLeft)
          Quartz.CGEventPost(Quartz.kCGSessionEventTap, e)
          """

          KEY_CODES = {
              'tab':48,'enter':36,'return':36,'space':49,'escape':53,'esc':53,
              'left':123,'right':124,'down':125,'up':126,
              'delete':51,'backspace':51,
          }
          CMD_KEYS = {
              'cmd+a':(0,'command'),'cmd+c':(8,'command'),'cmd+v':(9,'command'),
              'cmd+z':(6,'command'),'cmd+tab':(48,'command'),'cmd+space':(49,'command'),
              'cmd+q':(12,'command'),'cmd+w':(13,'command'),'cmd+r':(15,'command'),
          }

          def _gui_uid():
              return open('/tmp/gui_uid').read().strip()

          def gui_run(args):
              uid = _gui_uid()
              r = subprocess.run(['sudo','launchctl','asuser',uid]+args,
                                 capture_output=True, text=True, timeout=10)
              return r.returncode==0, (r.stdout+r.stderr).strip()

          def quartz(script):
              uid = _gui_uid()
              r = subprocess.run(
                  ['sudo','launchctl','asuser',uid,'python3','-c',script],
                  capture_output=True, text=True, timeout=10)
              return r.returncode==0, (r.stdout+r.stderr).strip()

          def osa(script):
              return gui_run(['osascript','-e',script])

          def send_key(key):
              k = key.lower().strip()
              if k in CMD_KEYS:
                  code,mod = CMD_KEYS[k]
                  return osa(f'tell application "System Events" to key code {code} using {{{mod} down}}')
              if k in KEY_CODES:
                  return osa(f'tell application "System Events" to key code {KEY_CODES[k]}')
              safe = k.replace('\\','\\\\').replace('"','\\"')
              return osa(f'tell application "System Events" to keystroke "{safe}"')

          def dialog_btn(name):
              n = name.replace('"','\\"')
              script = f'''tell application "System Events"
                  repeat with proc in every process
                      try
                          repeat with win in every window of proc
                              try
                                  click button "{n}" of win
                                  return "clicked"
                              end try
                          end repeat
                      end try
                  end repeat
              end tell'''
              return osa(script)

          class Handler(SimpleHTTPRequestHandler):
              def do_GET(self):
                  p = urllib.parse.urlparse(self.path)
                  if p.path.startswith('/api/'):
                      self._api(p.path, urllib.parse.parse_qs(p.query))
                  elif p.path in ('/','/index.html'):
                      data = open('/tmp/stream/index.html','rb').read()
                      self.send_response(200)
                      self.send_header('Content-Type','text/html')
                      self.send_header('Content-Length',str(len(data)))
                      self.end_headers(); self.wfile.write(data)
                  else:
                      super().do_GET()

              def _api(self, path, q):
                  try:
                      if path == '/api/mouse':
                          x=int(q.get('x',['0'])[0]); y=int(q.get('y',['0'])[0])
                          act=q.get('action',['move'])[0]
                          if   act=='click':  ok,e=quartz(_Q_CLICK.format(x=x,y=y))
                          elif act=='double': ok,e=quartz(_Q_DBL.format(x=x,y=y))
                          elif act=='right':  ok,e=quartz(_Q_RIGHT.format(x=x,y=y))
                          else:               ok,e=quartz(_Q_MOVE.format(x=x,y=y))
                          return self._r({'status':'ok' if ok else 'error','error':e})

                      if path == '/api/key':
                          k=q.get('key',[''])[0]; ok,o=send_key(k)
                          return self._r({'status':'ok' if ok else 'error','out':o})

                      if path == '/api/type':
                          t=q.get('text',[''])[0]
                          s=t.replace('\\','\\\\').replace('"','\\"')
                          ok,o=osa(f'tell application "System Events" to keystroke "{s}"')
                          return self._r({'status':'ok' if ok else 'error'})

                      if path == '/api/dialog':
                          b=q.get('btn',['Allow'])[0]; ok,o=dialog_btn(b)
                          return self._r({'status':'ok' if ok else 'error','out':o})

                      if path == '/api/shot':
                          subprocess.run(['screencapture','-x','-C','/tmp/stream/screen.jpg'])
                          return self._r({'status':'ok'})

                      if path == '/api/open':
                          app=q.get('app',['Safari'])[0]
                          gui_run(['open','-a',app])
                          return self._r({'status':'ok'})

                      if path == '/api/shell':
                          cmd=q.get('cmd',[''])[0]
                          res=subprocess.run(cmd,shell=True,capture_output=True,text=True,timeout=15)
                          return self._r({'status':'ok','stdout':res.stdout,'stderr':res.stderr})

                      if path == '/api/vnc_status':
                          # Returns current VNC state for UI
                          try:
                              ts=subprocess.run(['/opt/homebrew/bin/tailscale','ip','-4'],
                                                capture_output=True,text=True,timeout=5).stdout.strip()
                              addr=f'{ts}:5900'
                          except Exception:
                              addr='<tailscale-ip>:5900'
                          return self._r({'status':'ok','addr':addr,'password':'apple'})

                  except Exception as e:
                      return self._r({'status':'error','error':str(e)},500)
                  self.send_response(404); self.end_headers()

              def _r(self, data, code=200):
                  body=json.dumps(data).encode()
                  self.send_response(code)
                  self.send_header('Content-Type','application/json')
                  self.send_header('Access-Control-Allow-Origin','*')
                  self.send_header('Content-Length',str(len(body)))
                  self.end_headers(); self.wfile.write(body)

              def log_message(self,*a): pass

          os.chdir('/tmp/stream')
          print('[+] webserver on :8000')
          HTTPServer(('0.0.0.0',8000),Handler).serve_forever()
          ENDPY

          sudo nohup python3 /tmp/stream/webserver.py > /tmp/webserver.log 2>&1 &
          sleep 2
          echo "[+] webserver PID: $(pgrep -f webserver.py)"

      - name: Install Tailscale
        run: |
          brew install tailscale
          sudo /opt/homebrew/bin/tailscaled > /dev/null 2>&1 &
          sleep 10
          sudo /opt/homebrew/bin/tailscale up \
            --authkey=tskey-auth-ktQmDD4sz521CNTRL-nEQ4CuBDRy1h8mPKipGey1PLwtd9hWgE \
            --hostname=gh-macos-forensic

      - name: Session Maintenance
        run: |
          TS_IP=$(/opt/homebrew/bin/tailscale ip -4)
          echo "════════════════════════════════════"
          echo "  WEB PANEL : http://$TS_IP:8000"
          echo "  VNC HOST  : $TS_IP"
          echo "  VNC PORT  : 5900"
          echo "  VNC PASS  : apple"
          echo "════════════════════════════════════"
          while true; do
            echo "[$(date '+%H:%M:%S')] alive · $TS_IP"
            sleep 600
          done
