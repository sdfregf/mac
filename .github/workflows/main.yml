name: macOS-Silicon-Direct-Access

on:
  workflow_dispatch:

jobs:
  create-access:
    runs-on: macos-latest
    timeout-minutes: 3600

    steps:
      - name: Create User "apple"
        run: |
          sudo dscl . -create /Users/apple
          sudo dscl . -create /Users/apple UserShell /bin/zsh
          sudo dscl . -create /Users/apple RealName "Apple Admin"
          sudo dscl . -create /Users/apple UniqueID 502
          sudo dscl . -create /Users/apple PrimaryGroupID 20
          sudo dscl . -create /Users/apple NFSHomeDirectory /Users/apple
          sudo dscl . -passwd /Users/apple "apple"
          sudo dscl . -append /Groups/admin GroupMembership apple
          sudo createhomedir -c -u apple > /dev/null 2>&1

      - name: Setup Screen, Webserver & UI
        run: |
          sudo pmset -a displaysleep 0 sleep 0 disksleep 0
          caffeinate -dimsu &

          GUI_USER=$(stat -f "%Su" /dev/console)
          GUI_UID=$(id -u "$GUI_USER")
          echo "$GUI_UID" > /tmp/gui_uid
          echo "$GUI_USER" > /tmp/gui_user
          mkdir -p /tmp/stream

          # ── Install Quartz (Kept for Accessibility API) ──
          pip3 install pyobjc-framework-Quartz pyobjc-framework-ApplicationServices --break-system-packages --quiet

          # ── Screencap loop (Optimized) ─────────────────────────────
          cat > /tmp/screencap_loop.sh << 'SCREENCAP'
          #!/bin/bash
          while true; do
            screencapture -x -C /tmp/stream/screen_tmp.jpg 2>/dev/null
            mv /tmp/stream/screen_tmp.jpg /tmp/stream/screen.jpg
          done
          SCREENCAP
          chmod +x /tmp/screencap_loop.sh
          bash /tmp/screencap_loop.sh > /tmp/screencap.log 2>&1 &

          # ── index.html ─────────────────────────────────────────────
          cat > /tmp/stream/index.html << 'ENDHTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>macOS Remote</title>
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
          <style>
            :root {
              --bg:      #060608; --s0:      #0c0c10;
              --s1:      #111118; --s2:      #18181f;
              --border:  #22222e; --border2: #2e2e3e;
              --accent:  #4af;    --accentd: #0a1e2e;
              --green:   #2dce6e; --greend:  #0a1e14;
              --red:     #ff4d5e; --redd:    #200a0c;
              --yellow:  #f5c842; --yelld:   #201800;
              --text:    #d8d8e8; --muted:   #55556a;
              --muted2:  #3a3a50;
            }
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            html, body { height: 100%; overflow: hidden; }
            body {
              background: var(--bg); color: var(--text);
              font-family: 'IBM Plex Mono', monospace;
              font-size: 12px; display: flex; flex-direction: column;
            }
            .topbar {
              display: flex; align-items: center; gap: 10px;
              padding: 0 14px; height: 38px; background: var(--s0);
              border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10;
            }
            .topbar-title {
              font-size: 11px; font-weight: 600; letter-spacing: .12em;
              text-transform: uppercase; color: var(--accent);
            }
            .badge {
              font-size: 10px; padding: 2px 7px; border-radius: 3px;
              border: 1px solid; letter-spacing: .06em;
            }
            .badge-quartz  { color: #7c6cff; border-color: #3a2e6e; background: #0e0c1e; }
            .badge-live    { color: var(--green); border-color: #1a4a2a; background: var(--greend); animation: pulse 2s infinite; }
            @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
            #topstatus { margin-left: auto; font-size: 11px; color: var(--muted); }
            .body { display: flex; flex: 1; overflow: hidden; }
            .sidebar {
              width: 210px; min-width: 210px; background: var(--s0);
              border-right: 1px solid var(--border); display: flex;
              flex-direction: column; overflow-y: auto; overflow-x: hidden;
            }
            .sidebar::-webkit-scrollbar { width: 4px; }
            .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
            .panel { border-bottom: 1px solid var(--border); padding: 10px; }
            .panel-title {
              font-size: 9px; font-weight: 600; letter-spacing: .14em;
              text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
            }
            .btn {
              display: flex; align-items: center; gap: 6px; width: 100%;
              padding: 6px 9px; background: var(--s1); color: var(--text);
              border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
              font-family: 'IBM Plex Mono', monospace; font-size: 11px;
              margin-bottom: 3px; transition: background .12s, border-color .12s, color .12s;
              text-align: left; white-space: nowrap;
            }
            .btn:hover { background: var(--s2); border-color: var(--border2); }
            .btn.g  { border-color: #1a3520; }
            .btn.g:hover { background: var(--greend); border-color: var(--green); color: var(--green); }
            .btn.r  { border-color: #2a1012; }
            .btn.r:hover { background: var(--redd); border-color: var(--red); color: var(--red); }
            .btn.y:hover { background: var(--yelld); border-color: var(--yellow); color: var(--yellow); }
            .btn.on { background: var(--accentd); border-color: var(--accent); color: var(--accent); }
            .btn.on-g { background: var(--greend); border-color: var(--green); color: var(--green); }
            .btn.on-y { background: var(--yelld); border-color: var(--yellow); color: var(--yellow); }
            .btn-icon { font-size: 13px; flex-shrink: 0; }
            .keygrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin-bottom: 3px; }
            .keygrid .btn { margin: 0; justify-content: center; padding: 5px 4px; font-size: 10px; }
            .keyrow { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-bottom: 3px; }
            .keyrow .btn { margin: 0; justify-content: center; padding: 5px 4px; font-size: 10px; }
            .arrowgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto; gap: 3px; }
            .arrowgrid .btn { margin: 0; justify-content: center; padding: 5px; font-size: 13px; }
            .inp {
              width: 100%; background: var(--bg); border: 1px solid var(--border2);
              color: var(--text); padding: 6px 8px; border-radius: 4px;
              font-family: 'IBM Plex Mono', monospace; font-size: 11px;
              margin-bottom: 4px; outline: none; transition: border-color .15s;
            }
            .inp:focus { border-color: var(--accent); }
            .screen-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #000; }
            .screen-scroll {
              flex: 1; overflow: auto; position: relative; display: flex;
              align-items: flex-start; justify-content: flex-start;
            }
            #screen {
              display: block; max-width: 100%; user-select: none;
              -webkit-user-drag: none; image-rendering: -webkit-optimize-contrast;
            }
            .toolbar {
              display: flex; align-items: center; gap: 5px; padding: 5px 10px;
              background: var(--s0); border-top: 1px solid var(--border);
              flex-shrink: 0; flex-wrap: wrap;
            }
            .toolbar .btn { width: auto; margin: 0; padding: 4px 10px; font-size: 10px; }
            .sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }
            .logbar {
              height: 56px; overflow-y: auto; background: var(--bg);
              border-top: 1px solid var(--border); padding: 3px 10px; flex-shrink: 0;
            }
            .logbar::-webkit-scrollbar { width: 3px; }
            .logbar::-webkit-scrollbar-thumb { background: var(--border); }
            .logline { padding: 1px 0; font-size: 10px; }
            .logline.ok   { color: var(--green); }
            .logline.err  { color: var(--red); }
            .logline.info { color: var(--accent); }
            .logline.warn { color: var(--yellow); }
            .divlabel {
              font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
              color: var(--muted2); text-align: center; padding: 4px 0 2px;
            }
          </style>
          </head>
          <body>

          <div class="topbar">
            <span class="topbar-title">⌘ macOS Remote</span>
            <span class="badge badge-quartz">Quartz</span>
            <span class="badge badge-live" id="livebadge">● LIVE</span>
            <span id="topstatus">Ready</span>
          </div>

          <div class="body">
            <div class="sidebar">

              <div class="panel">
                <div class="panel-title">System & Permissions</div>
                <button class="btn on-y" onclick="reqAx()"><span class="btn-icon">🔐</span>Req Accessibility</button>
                <button class="btn"   onclick="dlg('Open System Settings')"><span class="btn-icon">⚙</span>System Settings</button>
              </div>

              <div class="panel">
                <div class="panel-title">Custom Key Combo Builder</div>
                <div class="keygrid" style="margin-bottom:6px;">
                  <button class="btn" id="mod-cmd" onclick="toggleMod('cmd')">⌘ Cmd</button>
                  <button class="btn" id="mod-opt" onclick="toggleMod('opt')">⌥ Opt</button>
                  <button class="btn" id="mod-ctrl" onclick="toggleMod('ctrl')">⌃ Ctrl</button>
                  <button class="btn" id="mod-shift" onclick="toggleMod('shift')">⇧ Shift</button>
                </div>
                <div style="display:flex; gap:4px; align-items:center;">
                  <input class="inp" id="custom-key" placeholder="Key (e.g. a, esc, f1)" style="margin:0; flex:1;" onkeydown="if(event.key==='Enter')sendCustomCombo()">
                  <button class="btn on-g" onclick="sendCustomCombo()" style="width:auto; margin:0; padding:6px 12px;">Send</button>
                </div>
              </div>

              <div class="panel">
                <div class="panel-title">Dialog Buttons</div>
                <button class="btn g" onclick="dlg('Allow')"><span class="btn-icon">✓</span>Allow</button>
                <button class="btn g" onclick="dlg('OK')"><span class="btn-icon">✓</span>OK</button>
                <button class="btn r" onclick="dlg('Don\'t Allow')"><span class="btn-icon">✕</span>Don't Allow</button>
                <button class="btn r" onclick="dlg('Cancel')"><span class="btn-icon">✕</span>Cancel</button>
              </div>

              <div class="panel">
                <div class="panel-title">Keyboard — Navigation</div>
                <div class="keygrid">
                  <button class="btn" onclick="key('tab')">⇥ Tab</button>
                  <button class="btn" onclick="key('space')">Spc</button>
                  <button class="btn" onclick="key('enter')">↩ Ret</button>
                </div>
                <div class="keyrow">
                  <button class="btn" onclick="key('escape')">⎋ Esc</button>
                  <button class="btn" onclick="key('delete')">⌫ Del</button>
                </div>
                <div class="divlabel">arrows</div>
                <div class="arrowgrid">
                  <div></div>
                  <button class="btn" onclick="key('up')">▲</button>
                  <div></div>
                  <button class="btn" onclick="key('left')">◀</button>
                  <button class="btn" onclick="key('down')">▼</button>
                  <button class="btn" onclick="key('right')">▶</button>
                </div>
              </div>

              <div class="panel">
                <div class="panel-title">Keyboard — System</div>
                <div class="keygrid">
                  <button class="btn" onclick="key('cmd+a')">⌘A</button>
                  <button class="btn" onclick="key('cmd+c')">⌘C</button>
                  <button class="btn" onclick="key('cmd+v')">⌘V</button>
                  <button class="btn" onclick="key('cmd+z')">⌘Z</button>
                  <button class="btn" onclick="key('cmd+tab')">⌘⇥</button>
                  <button class="btn" onclick="key('cmd+space')">⌘Spc</button>
                  <button class="btn" onclick="key('cmd+q')">⌘Q</button>
                  <button class="btn" onclick="key('cmd+w')">⌘W</button>
                  <button class="btn" onclick="key('cmd+r')">⌘R</button>
                </div>
              </div>

              <div class="panel">
                <div class="panel-title">Keyboard — F1-F12</div>
                <div class="keygrid">
                  <button class="btn" onclick="key('f1')">F1</button>
                  <button class="btn" onclick="key('f2')">F2</button>
                  <button class="btn" onclick="key('f3')">F3</button>
                  <button class="btn" onclick="key('f4')">F4</button>
                  <button class="btn" onclick="key('f5')">F5</button>
                  <button class="btn" onclick="key('f6')">F6</button>
                  <button class="btn" onclick="key('f7')">F7</button>
                  <button class="btn" onclick="key('f8')">F8</button>
                  <button class="btn" onclick="key('f9')">F9</button>
                  <button class="btn" onclick="key('f10')">F10</button>
                  <button class="btn" onclick="key('f11')">F11</button>
                  <button class="btn" onclick="key('f12')">F12</button>
                </div>
              </div>

              <div class="panel">
                <div class="panel-title">Keyboard — Control</div>
                <div class="keygrid">
                  <button class="btn" onclick="key('ctrl+c')">^C Break</button>
                  <button class="btn" onclick="key('ctrl+z')">^Z Sleep</button>
                  <button class="btn" onclick="key('ctrl+d')">^D EOF</button>
                  <button class="btn" onclick="key('ctrl+l')">^L Clear</button>
                  <button class="btn" onclick="key('ctrl+a')">^A</button>
                  <button class="btn" onclick="key('ctrl+e')">^E</button>
                </div>
              </div>

              <div class="panel">
                <div class="panel-title">Type Text</div>
                <input class="inp" id="typetext" placeholder="type something..." onkeydown="if(event.key==='Enter')doType()">
                <button class="btn" onclick="doType()"><span class="btn-icon">⌨</span>Send Text</button>
              </div>

              <div class="panel">
                <div class="panel-title">Open App</div>
                <button class="btn" onclick="openApp('Safari')"><span class="btn-icon">🌐</span>Safari</button>
                <button class="btn" onclick="openApp('Finder')"><span class="btn-icon">📁</span>Finder</button>
                <button class="btn" onclick="openApp('Terminal')"><span class="btn-icon">⚡</span>Terminal</button>
              </div>

              <div class="panel">
                <div class="panel-title">Shell</div>
                <input class="inp" id="shellcmd" placeholder="shell command..." onkeydown="if(event.key==='Enter')runShell()">
                <button class="btn" onclick="runShell()"><span class="btn-icon">▶</span>Run</button>
                <div id="shellout" style="margin-top:4px;padding:5px;background:var(--bg);border:1px solid var(--border);border-radius:3px;font-size:10px;color:var(--green);min-height:28px;word-break:break-all;display:none;max-height:80px;overflow-y:auto;"></div>
              </div>

            </div>

            <div class="screen-col">
              <div class="screen-scroll" id="screenbox">
                <img id="screen" src="screen.jpg" alt="screen" draggable="false">
              </div>

              <div class="toolbar">
                <button class="btn" id="auto-btn" onclick="toggleAuto()"><span class="btn-icon">⟳</span>Auto: OFF</button>
                <div class="sep"></div>
                <button class="btn" onclick="snap()">📸 Snap</button>
              </div>

              <div class="logbar" id="logbar"></div>
            </div>

          </div>

          <script>
          let autoActive=false;
          const img=document.getElementById('screen');
          
          function log(msg,cls='info'){
            const b=document.getElementById('logbar');
            const d=document.createElement('div');
            d.className='logline '+cls;
            const t=new Date().toLocaleTimeString('en',{hour12:false});
            d.textContent=`${t}  ${msg}`;
            b.prepend(d);
            while(b.children.length>60) b.removeChild(b.lastChild);
          }
          
          function setStatus(msg,ok){
            document.getElementById('topstatus').textContent=msg;
            document.getElementById('topstatus').style.color=ok===false?'var(--red)':'var(--muted)';
          }

          function toggleAuto(){
            const b=document.getElementById('auto-btn');
            autoActive = !autoActive;
            if(!autoActive){
               b.innerHTML='<span class="btn-icon">⟳</span>Auto: OFF';
               b.className='btn';
            } else {
               b.innerHTML='<span class="btn-icon">⟳</span>Auto: ON';
               b.className='btn on-g';
               streamNext();
            }
          }

          function streamNext() {
            if(!autoActive) return;
            const tempImg = new Image();
            tempImg.onload = () => {
                img.src = tempImg.src;
                requestAnimationFrame(streamNext);
            };
            tempImg.onerror = () => { setTimeout(streamNext, 50); };
            tempImg.src = 'screen.jpg?t=' + Date.now();
          }

          function refresh(){ img.src='screen.jpg?t='+Date.now(); }

          function snap(){
            api('/api/shot').then(()=>{log('snapshot taken','ok');if(!autoActive)setTimeout(refresh,500);});
          }

          function reqAx(){
            api('/api/ax').then(d=>{log(`Requested Accessibility: ${d.status}`, d.status==='ok'?'ok':'err');if(!autoActive)setTimeout(refresh,700);});
          }

          // NEW: Custom Key Combo Logic
          let customMods = {cmd:false, opt:false, ctrl:false, shift:false};
          function toggleMod(m){
            customMods[m] = !customMods[m];
            const b = document.getElementById('mod-'+m);
            b.className = 'btn' + (customMods[m] ? ' on' : '');
          }
          function sendCustomCombo(){
            let parts = [];
            if(customMods.cmd) parts.push('cmd');
            if(customMods.ctrl) parts.push('ctrl');
            if(customMods.opt) parts.push('opt');
            if(customMods.shift) parts.push('shift');

            let k = document.getElementById('custom-key').value.trim().toLowerCase();
            if(!k){ log('Enter a base key (e.g., a, f1, esc)','warn'); return; }
            parts.push(k);
            
            let combo = parts.join('+');
            key(combo);
            
            // Clear input after sending
            document.getElementById('custom-key').value = '';
          }

          function key(k){
            api(`/api/key?key=${encodeURIComponent(k)}`)
              .then(d=>{log(`key [${k}] → ${d.status}`,d.status==='ok'?'ok':'err');if(!autoActive)setTimeout(refresh,500);});
          }

          function dlg(name){
            setStatus(`Pressing "${name}"…`);
            api(`/api/dialog?btn=${encodeURIComponent(name)}`)
              .then(d=>{
                const ok=d.status==='ok';
                log(`dialog "${name}" → ${d.status} ${d.out||d.error||''}`,ok?'ok':'err');
                setStatus(ok?`"${name}" pressed`:`"${name}" failed`,ok);
                if(!autoActive)setTimeout(refresh,700);
              });
          }

          function doType(){
            const t=document.getElementById('typetext').value;
            if(!t)return;
            api(`/api/type?text=${encodeURIComponent(t)}`)
              .then(d=>{log(`typed: "${t}" → ${d.status}`,d.status==='ok'?'ok':'err');});
            document.getElementById('typetext').value='';
          }

          function openApp(name){
            api(`/api/open?app=${encodeURIComponent(name)}`)
              .then(d=>{log(`open ${name} → ${d.status}`,d.status==='ok'?'ok':'err');if(!autoActive)setTimeout(refresh,1200);});
          }

          function runShell(){
            const cmd=document.getElementById('shellcmd').value;
            if(!cmd)return;
            api(`/api/shell?cmd=${encodeURIComponent(cmd)}`)
              .then(d=>{
                log(`shell: ${cmd}`,d.status==='ok'?'ok':'err');
                const o=document.getElementById('shellout');
                o.style.display='block';
                o.textContent=d.stdout||d.stderr||'(no output)';
              });
            document.getElementById('shellcmd').value='';
          }

          async function api(path){
            try{
              const r=await fetch(path);
              const d=await r.json();
              return d;
            }catch(e){log('fetch error: '+e,'err');return{status:'error'};}
          }

          snap();
          setTimeout(refresh,900);
          log('control panel ready — Keyboard Only Mode','ok');
          </script>
          </body>
          </html>
          ENDHTML

          # ── webserver.py ───────────────────────────────────────────
          cat > /tmp/stream/webserver.py << 'ENDPY'
          #!/usr/bin/env python3
          import json, os, subprocess, urllib.parse
          from http.server import SimpleHTTPRequestHandler, HTTPServer

          _Q_AX = """
          import ApplicationServices
          opts = {ApplicationServices.kAXTrustedCheckOptionPrompt: True}
          ApplicationServices.AXIsProcessTrustedWithOptions(opts)
          """

          # Expanded System Keycodes for Maximum Coverage
          KEY_CODES = {
              'tab':48,'enter':36,'return':36,'space':49,'escape':53,'esc':53,
              'left':123,'right':124,'down':125,'up':126,
              'delete':51,'backspace':51,'forwarddelete':117,
              'home':115,'end':119,'pageup':116,'pagedown':121,
              'f1':122,'f2':120,'f3':99,'f4':118,'f5':96,'f6':97,'f7':98,
              'f8':100,'f9':101,'f10':109,'f11':103,'f12':111,
              'f13':105,'f14':107,'f15':113,'f16':106,'f17':64,'f18':79,'f19':80,
              'help':114,'mute':74,'volup':72,'voldown':73,
          }

          def _gui_uid():
              return open('/tmp/gui_uid').read().strip()

          def gui_run(args):
              uid = _gui_uid()
              r = subprocess.run(
                  ['sudo','launchctl','asuser', uid] + args,
                  capture_output=True, text=True, timeout=10
              )
              return r.returncode == 0, (r.stdout+r.stderr).strip()

          def quartz(script):
              uid = _gui_uid()
              r = subprocess.run(
                  ['sudo', 'launchctl', 'asuser', uid, 'python3', '-c', script],
                  capture_output=True, text=True, timeout=10
              )
              return r.returncode == 0, (r.stdout+r.stderr).strip()

          def osa(script):
              return gui_run(['osascript','-e',script])

          def send_key(key):
              k = key.lower().strip()
              
              # Direct keycode match
              if k in KEY_CODES:
                  return osa(f'tell application "System Events" to key code {KEY_CODES[k]}')

              # Modifier logic handling
              if '+' in k:
                  parts = k.split('+')
                  mods = []
                  if 'cmd' in parts: mods.append("command down")
                  if 'ctrl' in parts: mods.append("control down")
                  if 'opt' in parts or 'alt' in parts: mods.append("option down")
                  if 'shift' in parts: mods.append("shift down")

                  char = parts[-1]
                  
                  if mods:
                      mod_list = "{" + ", ".join(mods) + "}"
                      if char in KEY_CODES:
                          return osa(f'tell application "System Events" to key code {KEY_CODES[char]} using {mod_list}')
                      else:
                          safe = char.replace('\\','\\\\').replace('"','\\"')
                          return osa(f'tell application "System Events" to keystroke "{safe}" using {mod_list}')
              
              # Standard individual character keystroke fallback
              safe = k.replace('\\','\\\\').replace('"','\\"')
              return osa(f'tell application "System Events" to keystroke "{safe}"')

          def dialog_btn(name):
              n = name.replace('"','\\"')
              script = f'''tell application "System Events"
              repeat with proc in every process
                  try
                      repeat with win in every window of proc
                          try
                              click button "{n}" of win
                              return "clicked"
                          end try
                      end repeat
                  end try
              end repeat
          end tell'''
              return osa(script)

          class Handler(SimpleHTTPRequestHandler):
              def do_GET(self):
                  p = urllib.parse.urlparse(self.path)
                  if p.path.startswith('/api/'):
                      self._api(p.path, urllib.parse.parse_qs(p.query))
                  elif p.path in ('/', '/index.html'):
                      data = open('/tmp/stream/index.html','rb').read()
                      self.send_response(200)
                      self.send_header('Content-Type','text/html')
                      self.send_header('Content-Length',str(len(data)))
                      self.end_headers()
                      self.wfile.write(data)
                  else:
                      super().do_GET()

              def _api(self, path, q):
                  try:
                      if path == '/api/ax':
                          ok,e = quartz(_Q_AX)
                          return self._r({'status':'ok' if ok else 'error','error':e})

                      if path == '/api/key':
                          k = q.get('key',[''])[0]
                          ok,o = send_key(k)
                          return self._r({'status':'ok' if ok else 'error','key':k,'out':o})

                      if path == '/api/type':
                          t = q.get('text',[''])[0]
                          s = t.replace('\\','\\\\').replace('"','\\"')
                          ok,o = osa(f'tell application "System Events" to keystroke "{s}"')
                          return self._r({'status':'ok' if ok else 'error'})

                      if path == '/api/dialog':
                          b = q.get('btn',['Allow'])[0]
                          ok,o = dialog_btn(b)
                          return self._r({'status':'ok' if ok else 'error','btn':b,'out':o})

                      if path == '/api/shot':
                          subprocess.run(['screencapture','-x','-C','/tmp/stream/screen_tmp.jpg'])
                          subprocess.run(['mv','/tmp/stream/screen_tmp.jpg','/tmp/stream/screen.jpg'])
                          return self._r({'status':'ok'})

                      if path == '/api/open':
                          app = q.get('app',['Safari'])[0]
                          gui_run(['open','-a',app])
                          return self._r({'status':'ok','app':app})

                      if path == '/api/shell':
                          cmd = q.get('cmd',[''])[0]
                          res = subprocess.run(cmd, shell=True, capture_output=True, text=True, timeout=15)
                          return self._r({'status':'ok','stdout':res.stdout,'stderr':res.stderr})

                  except Exception as e:
                      return self._r({'status':'error','error':str(e)}, 500)
                  self.send_response(404)
                  self.end_headers()

              def _r(self, data, code=200):
                  body = json.dumps(data).encode()
                  self.send_response(code)
                  self.send_header('Content-Type','application/json')
                  self.send_header('Access-Control-Allow-Origin','*')
                  self.send_header('Content-Length',str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def log_message(self,*a): pass

          os.chdir('/tmp/stream')
          print('[+] webserver running :8000')
          HTTPServer(('0.0.0.0',8000),Handler).serve_forever()
          ENDPY

          sudo nohup python3 /tmp/stream/webserver.py > /tmp/webserver.log 2>&1 &
          sleep 2
          echo "[+] webserver PID: $(pgrep -f webserver.py)"

